<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feed Finder</title>

    <!-- Performance optimizations -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="//fonts.googleapis.com">

    <!-- Meta tags for performance and SEO -->
    <meta name="description" content="RSS / Atom Feed Discovery - Enter a website URL to automatically discover its RSS and Atom feeds">
    <meta name="theme-color" content="#f8fafc">

    <!-- Preload critical resources -->
    <link rel="modulepreload" href="/src/main.tsx">

    <script>
      (() => {
        const storageKey = "feed-finder-theme";
        const lightThemeColor = "#f8fafc";
        const darkThemeColor = "#0b1118";

        try {
          const storedTheme = localStorage.getItem(storageKey);
          const prefersDark = window.matchMedia(
            "(prefers-color-scheme: dark)",
          ).matches;
          const theme =
            storedTheme === "light" || storedTheme === "dark"
              ? storedTheme
              : prefersDark
                ? "dark"
                : "light";

          document.documentElement.dataset.theme = theme;
          document.documentElement.classList.toggle("dark", theme === "dark");
          document.documentElement.style.colorScheme = theme;
          document
            .querySelector('meta[name="theme-color"]')
            ?.setAttribute(
              "content",
              theme === "dark" ? darkThemeColor : lightThemeColor,
            );
        } catch {
          document.documentElement.dataset.theme = "light";
          document.documentElement.style.colorScheme = "light";
        }
      })();
    </script>

    <!-- Optimize rendering -->
    <style>
      /* Critical CSS for initial paint */
      :root {
        --app-bg: #f8fafc;
        --app-text: #020617;
      }
      :root[data-theme="dark"] {
        --app-bg: #0b1118;
        --app-text: #ffffff;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, sans-serif;
        background-color: var(--app-bg);
        color: var(--app-text);
      }
      #root {
        min-height: 100vh;
      }
      /* Loading state */
      .loading-skeleton {
        background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
        background-size: 200% 100%;
        animation: loading 1.5s infinite;
      }
      :root[data-theme="dark"] .loading-skeleton {
        background: linear-gradient(90deg, #223649 25%, #2a3f5a 50%, #223649 75%);
        background-size: 200% 100%;
      }
      @keyframes loading {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      @media (prefers-reduced-motion: reduce) {
        .loading-skeleton { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Loading fallback -->
      <div class="loading-skeleton" style="width: 100%; height: 4px; position: fixed; top: 0; z-index: 9999;"></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
